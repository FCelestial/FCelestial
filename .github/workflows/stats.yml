name: 更新 GitHub 统计

on:
  schedule:
    - cron: "0 0 * * *"   # 每天午夜 UTC+0
  workflow_dispatch:       # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── 统计卡片 ──
      - name: 生成 Stats 卡片
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=FCelestial&show_icons=true&theme=dracula&hide_border=true&bg_color=00000000&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 Top Langs 卡片
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=FCelestial&layout=compact&theme=dracula&hide_border=true&bg_color=00000000
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 贪吃蛇贡献图 ──
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: FCelestial
          outputs: |
            profile/snake-light.svg
            profile/snake-dark.svg?palette=github-dark

      # ── 提交所有产物 ──
      - name: 提交到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "📊 自动更新统计 + 贪吃蛇 [skip ci]" || exit 0
          git push
